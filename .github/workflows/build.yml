name: ksu_integration

on:
  push:
    branches: [main]

env:
  KERNEL: "${{ github.workspace }}/kernel"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: free_disk_space       
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    
    - name: install_packages
      run: |
        sudo apt install git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig repo
          
    - name: get_kernel
      run: |
        mkdir ./kernel && cd ./kernel

        repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-android13-5.10-2024-11

        repo --trace sync -c -j$(nproc --all) --no-tags --fail-fast

    - name: ksu_integration
      run: |
        cd "$KERNEL"

        curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/susfs-ksud/kernel/setup.sh" | bash

    - name: susfs_integration
      run: |
        cd "$KERNEL"

        git clone -b gki-android13-5.10 --single-branch https://gitlab.com/simonpunk/susfs4ksu.git

        cd ./susfs4ksu

        #cp ./kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ../KernelSU

        cp ./kernel_patches/50_add_susfs_in_gki-android13-5.10.patch ../common/

        cp ./kernel_patches/fs/* ../common/fs/

        cp ./kernel_patches/include/linux/* ../common/include/linux/

        #cd ../KernelSU
        #patch -p1 < 10_enable_susfs_for_ksu.patch

        cd ../common
        patch -p1 < 50_add_susfs_in_gki-android13-5.10.patch

    - name: Check susfs integration
      run: |
        cd "$KERNEL"
        
        grep -rn "susfs_is_current_ksu_domain" ./common/drivers/kernelsu/

        ls ./common/drivers/kernelsu/

    - name: fix_wifi
      run: |
        cd "$KERNEL"
        
        rm -rf ./common/android/abi_gki_protected_exports_aarch64
        rm -rf ./common/android/abi_gki_protected_exports_x86_64
        
    - name: create_config_fragment
      run: |
        cd "$KERNEL"

        cat > ./common/arch/arm64/configs/ksu.fragment << 'EOF'
        CONFIG_KPM=y
        CONFIG_KSU_TOOLKIT_SUPPORT=y
        CONFIG_KSU=y
        CONFIG_SUSFS=y
        CONFIG_KSU_SUSFS=y
        EOF

    - name: fix_erros
      run: |
        cd "$KERNEL"

        sed -i 's/vm_flags_clear(new_vma, VM_PAD_MASK);/new_vma->vm_flags \&= ~VM_PAD_MASK;/' ./common/mm/mmap.c
        
        #sed -i 's/size_t copied_size = 0;/size_t copied_size __attribute__((unused)) = 0;/' ./common/fs/susfs.c && sed -i 's/static int copy_config_to_buf/static __maybe_unused int copy_config_to_buf/' ./common/fs/susfs.c

        echo 'CFLAGS_susfs.o += -Wno-unused-function -Wno-unused-variable' >> ./common/fs/Makefile

    - name: fix_selinux_makefile
      run: |
        cd "$KERNEL"
        
        cat ./common/drivers/kernelsu/Makefile
        
        echo 'obj-y += selinux/' >> ./common/drivers/kernelsu/Makefile && echo 'obj-y += selinux.o' >> ./common/drivers/kernelsu/selinux/Makefile
    
    - name: build/compile
      run: |
        cd "$KERNEL"

        SKIP_MRPROPER=1 LTO=thin SKIP_EXT_MODULES=1 SKIP_CP_KERNEL_HDR=1 GKI_DEFCONFIG_FRAGMENT="./common/arch/arm64/configs/ksu.fragment" BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

    - name: create_anykernel3
      run: |
        cd ${{ github.workspace }}

        git clone https://github.com/osm0sis/AnyKernel3 anykernel3

        cp -r "$KERNEL/out/android13-5.10/dist/Image" ./anykernel3

        cat > ./anykernel3/anykernel.sh << 'EOF'
        kernel.string=ReSukiSU Android13 5.10.223
        do.devicecheck=0
        do.modules=0
        do.cleanup=1
        do.cleanuponabort=0
        is_slot_device=auto;
        ramdisk_compression=auto;
        . tools/ak3-core.sh;
        no_magisk_check=1
        EOF

        cd AnyKernel3

        zip -r9 ../ReSukiSU.zip . -x "*.git*"

    - name: upload_anykernel3
      uses: actions/upload-artifact@v4
      with:
        name: ReSukiSU-AnyKernel3
        path: ReSukiSU-*.zip
    

    
