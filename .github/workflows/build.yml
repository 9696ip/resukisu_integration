name: ksu_integration

on:
  push:
    branches: [main]

env:
  KERNEL: "${{ github.workspace }}/kernel"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: free_disk_space       
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    
    - name: install_packages
      run: |
        sudo apt install git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig repo
          
    - name: get_kernel
      run: |
        mkdir ./kernel && cd ./kernel

        repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-android13-5.10-2024-11

        repo --trace sync -c -j$(nproc --all) --no-tags --fail-fast

    - name: ksu_integration
      run: |
        cd "$KERNEL/common"

        curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/susfs-ksud/kernel/setup.sh" | bash

    - name: susfs_integration
      run: |
        cd "$KERNEL"

        git clone -b gki-android13-5.10 --single-branch https://gitlab.com/simonpunk/susfs4ksu.git

        cd ./susfs4ksu

        #cp ./kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ../KernelSU

        cp -r ./kernel_patches/50_add_susfs_in_gki-android13-5.10.patch ../common/

        cp -r ./kernel_patches/fs/* ../common/fs/

        cp -r ./kernel_patches/include/linux/* ../common/include/linux/

        #cd ../KernelSU
        #patch -p1 < 10_enable_susfs_for_ksu.patch

        cd ../common
        patch -p1 < 50_add_susfs_in_gki-android13-5.10.patch

    - name: fix_wifi
      run: |
        cd "$KERNEL"
        
        rm -rf ./common/android/abi_gki_protected_exports_aarch64
        rm -rf ./common/android/abi_gki_protected_exports_x86_64
        
    - name: create_config_fragment
      run: |
        cd "$KERNEL"

        printf 'CONFIG_KPM=y\nCONFIG_KSU_TOOLKIT_SUPPORT=y\nCONFIG_KSU=y\nCONFIG_KSU_SUSFS=y\n' > ./common/arch/arm64/configs/ksu.fragment

    - name: fix_export_symbols
      if: false
      run: |
        cd "$KERNEL"

        SELINUX_FILE="./common/drivers/kernelsu/selinux/selinux.c"
    
        # Verificar se o arquivo existe
        if [ ! -f "$SELINUX_FILE" ]; then
          echo "ERRO: Arquivo selinux.c não encontrado!"
          find ./common/drivers/kernelsu -name "*.c" -type f
          exit 1
        fi
    
        echo "" >> "$SELINUX_FILE"
        echo "/* SUSFS exports */" >> "$SELINUX_FILE"
        echo "EXPORT_SYMBOL(susfs_is_current_ksu_domain);" >> "$SELINUX_FILE"
        echo "EXPORT_SYMBOL(susfs_is_current_zygote_domain);" >> "$SELINUX_FILE"
        echo "EXPORT_SYMBOL(susfs_is_current_init_domain);" >> "$SELINUX_FILE"
    
        echo "Conteúdo final do arquivo:"
        tail -5 "$SELINUX_FILE"
    
        echo "Verificando todos os EXPORT_SYMBOL:"
        grep -n "EXPORT_SYMBOL(susfs" "$SELINUX_FILE"

    - name: fix_erros
      run: |
        cd "$KERNEL"

        sed -i 's/vm_flags_clear(new_vma, VM_PAD_MASK);/new_vma->vm_flags \&= ~VM_PAD_MASK;/' ./common/mm/mmap.c

        echo 'CFLAGS_susfs.o += -Wno-unused-function -Wno-unused-variable' >> ./common/fs/Makefile
        
    - name: build/compile
      if: false
      run: |
        cd "$KERNEL"
        
        export SKIP_MRPROPER=1
        export LTO=thin
        export SKIP_EXT_MODULES=1
        export SKIP_CP_KERNEL_HDR=1
        export GKI_DEFCONFIG_FRAGMENT="./common/arch/arm64/configs/ksu.fragment"
        export BUILD_CONFIG=common/build.config.gki.aarch64
        
        set -o pipefail
        build/build.sh 2>&1 | tee build.log


    - name: build_compile
      run: |
        cd "$KERNEL"

        export SKIP_MRPROPER=1
        export LTO=thin
        export SKIP_EXT_MODULES=1
        export SKIP_CP_KERNEL_HDR=1
        export BUILD_CONFIG=common/build.config.gki.aarch64
        export POST_DEFCONFIG_CMDS="scripts/kconfig/merge_config.sh -m -O \${OUT_DIR} \${OUT_DIR}/.config common/arch/arm64/configs/ksu.fragment"

        set -o pipefail
        build/build.sh 2>&1 | tee build.log
  
    - name: check_config_after_build
      if: always()
      run: |
        cd "$KERNEL"
        
        echo "=== .config KSU ==="
        grep "KSU\|SUSFS" ./out/android13-5.10/common/.config 2>/dev/null || echo "NAO ENCONTRADO"
    
        echo "=== Fragment ==="
        cat ./common/arch/arm64/configs/ksu.fragment
    
    - name: create_anykernel3
      if: false
      run: |
        cd ${{ github.workspace }}

        git clone https://github.com/osm0sis/AnyKernel3 anykernel3

        cp -r "$KERNEL/out/android13-5.10/dist/Image" ./anykernel3

        cat > ./anykernel3/anykernel.sh << 'EOF'
        kernel.string=ReSukiSU Android13 5.10.223
        do.devicecheck=0
        do.modules=0
        do.cleanup=1
        do.cleanuponabort=0
        is_slot_device=auto;
        ramdisk_compression=auto;
        . tools/ak3-core.sh;
        no_magisk_check=1
        EOF

        cd anykernel3

        zip -r9 ../ReSukiSU.zip . -x "*.git*"

    - name: finde_image
      run: |
        cd "$KERNEL"

        ls -a ./out/
        ls -a ./out/android13-5.10
        ls -a ./out/android13-5.10/common
        ls -a ./out/android13-5.10/dist

        find ./out -name "Image" -o -name "Image.gz" -o -name "Image.lz4" 2>/dev/null

    - name: upload_anykernel3
      uses: actions/upload-artifact@v4
      with:
        name: ReSukiSU-AnyKernel3
        path: ReSukiSU.zip
    

    
